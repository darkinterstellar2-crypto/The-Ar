<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Glasses Try-On</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loader-container">
                <div class="loader-ring"></div>
                <p id="loading-text">Initializing AR Engine...</p>
            </div>
        </div>

        <!-- Main AR View -->
        <div id="ar-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="ar-canvas"></canvas>

            <div id="ar-controls-wrap">
                <!-- Top Bar -->
                <div id="top-bar">
                    <button id="btn-camera-flip" class="icon-btn" title="Flip Camera">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 7l-4-4m4 4l-4 4m4-4H10a7 7 0 00-7 7v1m4 4l4 4m-4-4l4-4m-4 4h10a7 7 0 007-7v-1"/>
                        </svg>
                    </button>
                    <span id="fps-counter">-- FPS</span>
                    <button id="btn-screenshot" class="icon-btn" title="Screenshot">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M8 5V3h8v2"/>
                        </svg>
                    </button>
                </div>

                <!-- Frame Selector -->
                <div id="frame-selector">
                    <div id="frame-list"></div>
                </div>

                <!-- Controls -->
                <div id="controls">
                    <button id="btn-lens" class="control-btn" title="Lens Tint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="8"/>
                        </svg>
                        <span>Lens</span>
                    </button>
                    <button id="btn-color" class="control-btn" title="Frame Color">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a10 10 0 010 20"/>
                        </svg>
                        <span>Color</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Lens Picker -->
        <div id="lens-picker" class="hidden">
            <div class="lens-grid">
                <button class="lens-option active" data-lens="clear"><div class="lens-preview" style="background:transparent;border:2px solid rgba(255,255,255,0.3);"></div><span>Clear</span></button>
                <button class="lens-option" data-lens="sun-grey"><div class="lens-preview" style="background:rgba(30,30,30,0.6);"></div><span>Grey</span></button>
                <button class="lens-option" data-lens="sun-brown"><div class="lens-preview" style="background:rgba(80,40,10,0.5);"></div><span>Brown</span></button>
                <button class="lens-option" data-lens="sun-green"><div class="lens-preview" style="background:rgba(20,60,20,0.5);"></div><span>Green</span></button>
                <button class="lens-option" data-lens="blue-light"><div class="lens-preview" style="background:rgba(255,250,200,0.15);"></div><span>Blue Light</span></button>
                <button class="lens-option" data-lens="mirror-blue"><div class="lens-preview" style="background:linear-gradient(135deg,#1e90ff,#00bfff);"></div><span>Mirror</span></button>
                <button class="lens-option" data-lens="gradient"><div class="lens-preview" style="background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);"></div><span>Gradient</span></button>
                <button class="lens-option" data-lens="rose"><div class="lens-preview" style="background:rgba(200,50,80,0.35);"></div><span>Rosé</span></button>
            </div>
        </div>

        <!-- Color Picker -->
        <div id="color-picker" class="hidden">
            <div class="color-grid">
                <button class="color-swatch" data-color="#1a1a1a" style="background:#1a1a1a"></button>
                <button class="color-swatch" data-color="#8B4513" style="background:#8B4513"></button>
                <button class="color-swatch" data-color="#C0C0C0" style="background:#C0C0C0"></button>
                <button class="color-swatch" data-color="#FFD700" style="background:#FFD700"></button>
                <button class="color-swatch" data-color="#1E3A5F" style="background:#1E3A5F"></button>
                <button class="color-swatch" data-color="#8B0000" style="background:#8B0000"></button>
                <button class="color-swatch" data-color="#2F4F4F" style="background:#2F4F4F"></button>
                <button class="color-swatch" data-color="#FF69B4" style="background:#FF69B4"></button>
                <button class="color-swatch" data-color="#4169E1" style="background:#4169E1"></button>
                <button class="color-swatch" data-color="#228B22" style="background:#228B22"></button>
                <button class="color-swatch" data-color="#FF4500" style="background:#FF4500"></button>
                <button class="color-swatch" data-color="#800080" style="background:#800080"></button>
            </div>
        </div>

        <!-- Screenshot Preview -->
        <div id="screenshot-preview" class="hidden">
            <div class="screenshot-content">
                <img id="screenshot-img" alt="Screenshot">
                <div class="screenshot-actions">
                    <a id="screenshot-download" download="ar-tryon.png" class="screenshot-btn">Download</a>
                    <button id="screenshot-close" class="screenshot-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- App -->
    <script src="../src/js/one-euro-filter.js"></script>
    <script src="../src/js/gestures.js"></script>
    <script src="../src/js/glasses-models.js"></script>
    <script src="../src/js/face-tracker.js"></script>
    <script src="../src/js/ar-renderer.js"></script>
    <script src="../src/js/app.js"></script>
</body>
</html>
