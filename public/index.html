<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Glasses Try-On</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loader-container">
                <div class="loader-ring"></div>
                <p id="loading-text">Initializing AR Engine...</p>
            </div>
        </div>

        <!-- Main AR View -->
        <div id="ar-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="ar-canvas"></canvas>
            
            <!-- Top Bar -->
            <div id="top-bar">
                <button id="btn-camera-flip" class="icon-btn" title="Flip Camera">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7l-4-4m4 4l-4 4m4-4H10a7 7 0 00-7 7v1m4 4l4 4m-4-4l4-4m-4 4h10a7 7 0 007-7v-1"/>
                    </svg>
                </button>
                <span id="fps-counter">-- FPS</span>
                <button id="btn-screenshot" class="icon-btn" title="Take Screenshot">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="5" width="18" height="14" rx="2"/>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M8 5V3h8v2"/>
                    </svg>
                </button>
            </div>

            <!-- Frame Selector -->
            <div id="frame-selector">
                <div id="frame-list"></div>
            </div>

            <!-- PD Display -->
            <div id="pd-display" class="hidden">
                <span id="pd-value">PD: --mm</span>
            </div>

            <!-- Controls -->
            <div id="controls">
                <button id="btn-pd" class="control-btn" title="Measure PD">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/>
                        <path d="M10 12h4"/><path d="M2 12h4m8 0h4"/>
                    </svg>
                    <span>PD</span>
                </button>
                <button id="btn-color" class="control-btn" title="Change Color">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a10 10 0 010 20"/>
                    </svg>
                    <span>Color</span>
                </button>
            </div>
        </div>

        <!-- Color Picker Modal -->
        <div id="color-picker" class="hidden">
            <div class="color-grid">
                <button class="color-swatch" data-color="#1a1a1a" style="background:#1a1a1a" title="Black"></button>
                <button class="color-swatch" data-color="#8B4513" style="background:#8B4513" title="Brown"></button>
                <button class="color-swatch" data-color="#C0C0C0" style="background:#C0C0C0" title="Silver"></button>
                <button class="color-swatch" data-color="#FFD700" style="background:#FFD700" title="Gold"></button>
                <button class="color-swatch" data-color="#1E3A5F" style="background:#1E3A5F" title="Navy"></button>
                <button class="color-swatch" data-color="#8B0000" style="background:#8B0000" title="Burgundy"></button>
                <button class="color-swatch" data-color="#2F4F4F" style="background:#2F4F4F" title="Dark Teal"></button>
                <button class="color-swatch" data-color="#FF69B4" style="background:#FF69B4" title="Pink"></button>
                <button class="color-swatch" data-color="#4169E1" style="background:#4169E1" title="Royal Blue"></button>
                <button class="color-swatch" data-color="#228B22" style="background:#228B22" title="Forest Green"></button>
                <button class="color-swatch" data-color="#FF4500" style="background:#FF4500" title="Orange Red"></button>
                <button class="color-swatch" data-color="#800080" style="background:#800080" title="Purple"></button>
            </div>
        </div>

        <!-- Screenshot Preview -->
        <div id="screenshot-preview" class="hidden">
            <div class="screenshot-content">
                <img id="screenshot-img" alt="Screenshot">
                <div class="screenshot-actions">
                    <a id="screenshot-download" download="ar-tryon.png" class="screenshot-btn">Download</a>
                    <button id="screenshot-close" class="screenshot-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- App Modules -->
    <script src="../src/js/glasses-models.js"></script>
    <script src="../src/js/face-tracker.js"></script>
    <script src="../src/js/ar-renderer.js"></script>
    <script src="../src/js/pd-measurer.js"></script>
    <script src="../src/js/app.js"></script>
</body>
</html>
